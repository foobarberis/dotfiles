# Required for pi such as Ctrl+Enter or Shift+Enter to work
set -g extended-keys on
set -g extended-keys-format csi-u

set -g mouse on
set -g mode-keys vi

set -g default-terminal "tmux-256color"
# Make sure Tmux uses 24-bit color codes correctly
set -as terminal-overrides ",*-256color:Tc"

# Change prefix to 'C-a'
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Rebind splitting to more convenient keys
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind '%'

# Bind Alt + Arrow keys to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Start indexing windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Load theme
source-file ~/.config/tmux/mr.tmux
