# RetroArch shmup profile
# Launch with:
#   retroarch --appendconfig ~/.config/retroarch/shmup.cfg
# or copy these settings into retroarch.cfg.

#### Player 1 keyboard controls ####
input_player1_left = "a"
input_player1_down = "s"
input_player1_up = "w"
input_player1_right = "d"

# Arcade buttons. For FBNeo/MAME CAVE games, adjust per-core remap if needed:
# Quick Menu -> Controls -> Port 1 Controls -> Save Core/Game Remap
input_player1_b = "j"   # button 1: shot
input_player1_y = "h"   # button 2: laser / autofire, depending on core mapping
input_player1_a = "space"   # button 3: bomb, depending on core mapping

input_player1_start = "enter"
input_player1_select = "rshift"

#### Disable common default hotkeys ####
input_enable_hotkey = "nul"
input_menu_toggle = "escape"
input_quit_gamepad_combo = "0"
input_exit_emulator = "nul"
input_reset = "nul"
input_toggle_fast_forward = "nul"
input_hold_fast_forward = "nul"
input_rewind = "backspace"
input_slowmotion = "nul"
input_shader_next = "nul"
input_shader_prev = "nul"
input_screenshot = "nul"
input_movie_record_toggle = "nul"
input_streaming_toggle = "nul"
input_audio_mute = "nul"
input_volume_up = "nul"
input_volume_down = "nul"
input_disk_eject_toggle = "nul"
input_disk_next = "nul"
input_disk_prev = "nul"
input_cheat_toggle = "nul"
input_cheat_index_plus = "nul"
input_cheat_index_minus = "nul"
input_netplay_game_watch = "nul"
input_netplay_ping_toggle = "nul"
input_grab_mouse_toggle = "nul"
input_game_focus_toggle = "nul"
input_desktop_menu_toggle = "nul"
input_ai_service = "nul"
input_recording_toggle = "nul"
input_turbo = "nul"

#### Rebound hotkeys ####
# Escape opens the RetroArch menu / Quick Menu.
# p pauses.
# . advances one frame while paused.
# Hold Backspace to rewind. Rewind costs CPU/RAM and may add overhead, so disable
# rewind_enable again if it causes stutter.
input_pause_toggle = "p"
input_frame_advance = "period"

# Save states:
#   - / = changes the current state slot.
#   1 loads the current state slot.
#   0 saves the current state slot.
#
# RetroArch's key name for top-row digits is num0/num1/etc. Do not use "0"
# or "1" here; those may not bind on macOS.
#
# Example: press = until RetroArch shows "State Slot: 3", press 0 to save slot 3,
# then press 1 later to load slot 3.
#
# RetroArch config does not reliably support direct bindings like
# "1 loads slot 1" and "Ctrl+1 saves slot 1" across versions. It normally
# exposes one save key, one load key, and slot +/- keys.
input_load_state = "num1"
input_save_state = "num0"
input_state_slot_increase = "equals"
input_state_slot_decrease = "minus"

#### Rewind ####
rewind_enable = "true"
rewind_granularity = "1"
rewind_buffer_size = "100"

#### Input-lag reduction ####
video_vsync = "true"
video_hard_sync = "true"
video_hard_sync_frames = "0"
video_max_swapchain_images = "2"
video_frame_delay = "0"
video_frame_delay_auto = "true"

# Try 1 for CAVE shmups. If audio crackles, stutter appears, or the core misbehaves, set false.
run_ahead_enabled = "true"
run_ahead_frames = "1"
run_ahead_secondary_instance = "true"

# Avoid latency from shaders/scaling extras.
video_shader_enable = "false"
video_scale_integer = "true"
video_smooth = "false"

video_driver = "metal"
video_fullscreen = "false"
video_windowed_fullscreen = "false"
input_auto_game_focus = "0"
input_grab_mouse = "false"
input_auto_mouse_grab = "false"

# Poll input as late as possible where supported.
input_poll_type_behavior = "2"
