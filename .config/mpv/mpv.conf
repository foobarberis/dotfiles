# --- Video ---
vo=gpu-next
gpu-api=metal
hwdec=auto-safe
target-colorspace-hint=yes

# Keep the default image neutral. Use profiles below for exceptions.
saturation=0
gamma=0
brightness=0
contrast=0

# --- Audio ---
volume=100
volume-max=150
audio-normalize-downmix=yes

# --- Languages ---
alang=ja,jpn,ko,kor,en,eng,fr,fre
slang=en,eng,fr,fre

# --- Subtitles ---
sub-visibility=yes
sub-auto=fuzzy
sub-scale=1.25
sub-font-size=48
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color="#80000000"
subs-with-matching-audio=yes

# --- Playback behavior ---
save-position-on-quit=yes
resume-playback=yes
osd-duration=1500
osd-level=1

# --- Profiles ---
[desaturate]
profile-desc=Reduce oversaturated/red image for specific shows
profile-restore=copy-equal
saturation=-15
gamma=1
brightness=1
contrast=0
