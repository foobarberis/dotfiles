# Mirage Raceway for Alacritty

[colors.primary]
background = "#F7F4EE"
foreground = "#1E1B18"

[colors.cursor]
text = "#F7F4EE"
cursor = "#1E1B18"

# Subtle 10% ink-on-paper highlight (matches Vim's Visual/Search in mr.vim)
# 10% of #1E1B18 blended into #F7F4EE => #E1DED9
[colors.selection]
text = "#1E1B18"
background = "#E1DED9"

[colors.search.matches]
foreground = "#1E1B18"
background = "#E1DED9"

[colors.search.focused_match]
foreground = "#1E1B18"
background = "#E1DED9"

[colors.normal]
black = "#1E1B18"
red = "#B73A34"
green = "#0A7F5D"
yellow = "#CB3F00"
blue = "#006EC3"
magenta = "#B73A34"
cyan = "#006EC3"
white = "#F7F4EE"

[colors.bright]
black = "#1E1B18"
red = "#B73A34"
green = "#0A7F5D"
yellow = "#CB3F00"
blue = "#006EC3"
magenta = "#B73A34"
cyan = "#006EC3"
white = "#F7F4EE"
