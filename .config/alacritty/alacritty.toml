[general]
import = [
  "./mr.toml"
]
live_config_reload = true

[window]
dynamic_padding = false
opacity = 1.0

[cursor]
thickness = 0.40
blink_timeout = 0
blink_interval = 500

[cursor.style]
shape = "Underline"
blinking = "Always"

[window.padding]
x = 5
y = 5

[font]
size = 12.0

[font.normal]
family = "Comic Code"
style = "Regular"

[font.bold]
family = "Comic Code"
style = "Bold"

[font.italic]
family = "Comic Code"
style = "Oblique"

[font.bold_italic]
family = "Comic Code"
style = "Bold Oblique"

[selection]
save_to_clipboard = true

[scrolling]
history = 10000

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

[[keyboard.bindings]]
key = "Return"
mods = "Alt"
chars = "\u001b[13;3u"
